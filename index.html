<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jenkins + AI Auto Review & Deploy</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff;
    }
    .card {
      text-align: center;
      padding: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 { color: #00d4ff; margin-bottom: 10px; }
    p  { color: #aaa; }
    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 6px 16px;
      background: #00d4ff22;
      border: 1px solid #00d4ff;
      border-radius: 20px;
      font-size: 13px;
      color: #00d4ff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 Jenkins + AI Pipeline</h1>
    <p>Auto Code Review &amp; Deploy — Powered by Amazon Q</p>
    <div class="badge">✅ Deployed Successfully</div>
  </div>
</body>
</html>
